<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-950:#14192f; --paper:#faf3e7; --marigold:#e8a33d;
    --sindoor:#c1440e; --ink:#2a2118; --ink-soft:#6b6255;
    --line:rgba(42,33,24,0.14); --sage:#4c8f5c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Work Sans',sans-serif;
    background: radial-gradient(circle at 15% 10%, rgba(232,163,61,0.12), transparent 45%), var(--indigo-950);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px 16px;
  }
  .card{
    background:var(--paper); border-radius:18px; max-width:480px; width:100%;
    padding:34px 28px; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  h1{ font-family:'Fraunces',serif; font-size:24px; color:var(--indigo-950); margin:0 0 4px; }
  .order-id{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:28px; }

  .steps{ display:flex; flex-direction:column; gap:0; margin-bottom:28px; }
  .step{ display:flex; gap:14px; position:relative; padding-bottom:30px; }
  .step:last-child{ padding-bottom:0; }
  .step-line{
    position:absolute; left:17px; top:36px; bottom:0; width:2px; background:var(--line);
  }
  .step:last-child .step-line{ display:none; }
  .step.done .step-line{ background:var(--sage); }

  .step-icon{
    width:36px; height:36px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:#fff; border:2px solid var(--line); color:var(--ink-soft);
    font-size:16px; z-index:1; transition:all 0.3s ease;
  }
  .step.done .step-icon{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .step.active .step-icon{
    background:var(--marigold); border-color:var(--marigold); color:#fff;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(232,163,61,0.5);} 50%{ box-shadow:0 0 0 8px rgba(232,163,61,0);} }

  .step-text{ padding-top:6px; }
  .step-title{ font-weight:700; font-size:14.5px; color:var(--ink); }
  .step-sub{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }

  .summary{ border-top:1px dashed var(--line); padding-top:18px; }
  .summary h3{ font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--sindoor); margin:0 0 12px; }
  .line{ display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0; }
  .total{ display:flex; justify-content:space-between; font-weight:700; padding-top:10px; margin-top:6px; border-top:2px solid var(--indigo-950); font-family:'JetBrains Mono',monospace; }

  .home-btn{
    display:block; text-align:center; margin-top:22px; padding:13px;
    background:var(--sindoor); color:#fff; text-decoration:none; border-radius:10px;
    font-weight:700; font-size:14px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Tracking your order</h1>
  <div class="order-id">Order #{{ order_id }}</div>

  <div class="steps" id="steps">
    <div class="step" data-stage="1">
      <div><div class="step-icon">🧾</div><div class="step-line"></div></div>
      <div class="step-text"><div class="step-title">Order Received</div><div class="step-sub">We've got your order</div></div>
    </div>
    <div class="step" data-stage="2">
      <div><div class="step-icon">👨‍🍳</div><div class="step-line"></div></div>
      <div class="step-text"><div class="step-title">Preparing your food</div><div class="step-sub">Our chefs are cooking</div></div>
    </div>
    <div class="step" data-stage="3">
      <div><div class="step-icon">🍽️</div><div class="step-line"></div></div>
      <div class="step-text"><div class="step-title">Ready</div><div class="step-sub">Packed and ready to go</div></div>
    </div>
    <div class="step" data-stage="4">
      <div><div class="step-icon">✅</div></div>
      <div class="step-text"><div class="step-title">Delivered</div><div class="step-sub">Enjoy your meal!</div></div>
    </div>
  </div>

  <div class="summary">
    <h3>Order summary</h3>
    <div id="order-lines"></div>
    <div class="total"><span>Total</span><span id="order-total">₹0</span></div>
  </div>

  <a href="{{ url_for('home') }}" class="home-btn">Back to Home</a>
</div>

<script>
  const orderId = "{{ order_id }}";

  async function pollStatus() {
    try {
      const res = await fetch(`/order_status/${orderId}`);
      const data = await res.json();
      if (data.status === 'error') return;

      document.querySelectorAll('.step').forEach(el => {
        const s = parseInt(el.dataset.stage);
        el.classList.toggle('done', s < data.stage);
        el.classList.toggle('active', s === data.stage);
      });

      document.getElementById('order-lines').innerHTML = data.items.map(i =>
        `<div class="line"><span>${i.name} ×${i.quantity}</span><span>₹${i.price * i.quantity}</span></div>`
      ).join('');
      document.getElementById('order-total').textContent = `₹${data.total}`;

      if (data.stage < 4) setTimeout(pollStatus, 3000);
    } catch (e) {
      setTimeout(pollStatus, 4000);
    }
  }
  pollStatus();
</script>

</body>
</html>
