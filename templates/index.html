<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Dhaba - Sign In</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon-950: #200d0a;
    --maroon-900: #3a1410;
    --maroon-800: #4d1c15;
    --brass: #d4a017;
    --brass-bright: #e8b93a;
    --teal: #1f6f6f;
    --teal-dim: #185858;
    --cream: #fbf3e3;
    --ink: #2a1810;
    --ink-soft: #7a5f4d;
    --danger: #b3402c;
    --success: #4c7a4f;
    --line: rgba(42,24,16,0.16);
  }

  *{ box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 18px;
    background:
      radial-gradient(circle at 50% -10%, rgba(232,185,58,0.10), transparent 55%),
      linear-gradient(180deg, var(--maroon-950) 0%, var(--maroon-900) 55%, var(--maroon-950) 100%);
    position: relative;
    overflow-x: hidden;
  }

  .lights {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 90px;
    pointer-events: none;
    z-index: 1;
  }
  .lights svg { width: 100%; height: 100%; display: block; }
  .bulb { animation: glow 2.6s ease-in-out infinite; }
  .bulb:nth-child(3n) { animation-delay: 0.4s; }
  .bulb:nth-child(3n+1) { animation-delay: 0.9s; }
  .bulb:nth-child(3n+2) { animation-delay: 1.4s; }
  @keyframes glow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }

  .stage { position: relative; z-index: 5; width: 100%; max-width: 440px; }

  .frame {
    padding: 6px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--brass), var(--teal) 45%, var(--brass) 100%);
    box-shadow: 0 30px 60px rgba(0,0,0,0.45);
  }

  .card {
    background: var(--cream);
    border-radius: 18px;
    padding: 38px 34px 30px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1.5px dashed rgba(31,111,111,0.35);
    border-radius: 12px;
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.05;
    pointer-events: none;
    background-image: radial-gradient(circle at 20% 20%, var(--maroon-900) 0, transparent 3px),
                       radial-gradient(circle at 80% 15%, var(--teal) 0, transparent 3px),
                       radial-gradient(circle at 50% 92%, var(--brass) 0, transparent 3px),
                       radial-gradient(circle at 88% 85%, var(--maroon-900) 0, transparent 3px),
                       radial-gradient(circle at 8% 80%, var(--teal) 0, transparent 3px);
    background-size: 140px 140px;
  }

  .header { text-align: center; margin-bottom: 26px; position: relative; }

  .crest {
    width: 52px; height: 52px;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: radial-gradient(circle, var(--brass-bright), var(--brass));
    box-shadow: 0 6px 18px rgba(212,160,23,0.4);
    font-size: 26px;
  }

  .title {
    font-family: 'Fraunces', serif;
    font-size: 27px;
    font-weight: 700;
    color: var(--maroon-900);
    letter-spacing: 0.02em;
    margin: 0;
  }
  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 4px;
    font-family: 'Fraunces', serif;
  }

  .tabs {
    display: flex;
    margin-bottom: 24px;
    border-bottom: 1.5px solid var(--line);
    position: relative;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0 12px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    position: relative;
    background: none;
    border: none;
    font-family: 'Work Sans', sans-serif;
    transition: color 0.2s ease;
  }
  .tab.active { color: var(--maroon-900); }
  .tab-indicator {
    position: absolute;
    bottom: -1.5px;
    height: 2.5px;
    width: 50%;
    left: 0;
    background: var(--teal);
    border-radius: 2px;
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.28s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:translateY(0);} }

  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .input-wrap { position: relative; }
  .input-wrap .icon {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-soft);
    pointer-events: none;
    display: flex;
  }
  .input-wrap input { padding-left: 40px; }

  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fff;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
    font-family: 'Work Sans', sans-serif;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input[type="password"] { padding-right: 42px; }

  .remember-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: -4px 0 16px;
    font-size: 12.5px;
  }
  .remember-check {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .remember-check input {
    width: 14px; height: 14px;
    accent-color: var(--teal);
    padding: 0;
  }
  .forgot-link {
    color: var(--teal-dim);
    font-weight: 600;
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12.5px;
    font-family: 'Work Sans', sans-serif;
    padding: 0;
  }
  .forgot-link:hover { text-decoration: underline; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(251,243,227,0.4);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -2px;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar {
    width: 60px; height: 60px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brass-bright), var(--brass));
    color: var(--maroon-950);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(212,160,23,0.4);
  }
  .member-since {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(251,243,227,0.65);
    margin-top: 8px;
  }

  input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(31,111,111,0.15);
  }
  input.invalid {
    border-color: var(--danger);
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .toggle-eye {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    font-size: 15px;
    color: var(--ink-soft);
    padding: 4px;
    line-height: 1;
  }

  .error-msg {
    font-size: 11.5px;
    color: var(--danger);
    margin-top: 5px;
    min-height: 14px;
  }

  .hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 5px;
  }

  .strength {
    display: flex;
    gap: 4px;
    margin-top: 7px;
  }
  .strength span {
    height: 4px;
    flex: 1;
    border-radius: 2px;
    background: var(--line);
    transition: background 0.2s ease;
  }

  button.submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 6px;
    color: var(--cream);
    background: linear-gradient(135deg, var(--teal), var(--teal-dim));
    box-shadow: 0 8px 20px rgba(31,111,111,0.3);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  button.submit:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(31,111,111,0.4); }
  button.submit:active { transform: translateY(0); }
  button.submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  button.submit.brass {
    background: linear-gradient(135deg, var(--brass-bright), var(--brass));
    color: var(--maroon-950);
    box-shadow: 0 8px 20px rgba(212,160,23,0.35);
  }

  /* Google button */
  button.submit.google {
    background: #fff;
    color: #3c4043;
    border: 1.5px solid var(--line);
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 0;
  }
  button.submit.google:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    color: var(--ink-soft);
    font-size: 11.5px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .message {
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 18px;
    font-size: 13px;
    font-weight: 600;
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px);} to {opacity:1; transform:translateY(0);} }
  .message.success { background: #e4f1e5; color: var(--success); border: 1px solid #c5ddc6; }
  .message.error { background: #f6e2dd; color: var(--danger); border: 1px solid #eec6bb; }

  .dashboard-hero {
    text-align: center;
    padding: 28px 20px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--maroon-900), var(--maroon-800));
    color: var(--cream);
    margin-bottom: 20px;
  }
  .dashboard-hero .crest { margin-bottom: 10px; }
  .dashboard-hero h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin: 0 0 6px;
  }
  .dashboard-hero p { font-size: 13px; color: rgba(251,243,227,0.8); margin: 0; }

  .dash-link { display: block; text-decoration: none; margin-bottom: 10px; }

  .stat-strip {
    margin-top: 22px;
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    background: rgba(251,243,227,0.06);
    border: 1px solid rgba(212,160,23,0.3);
    color: var(--brass-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    max-width: 440px;
    width: 100%;
    box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="lights" aria-hidden="true">
  <svg viewBox="0 0 440 90" preserveAspectRatio="none">
    <path d="M0,10 Q220,70 440,10" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
    <g id="bulbs"></g>
  </svg>
</div>

<div class="stage">
  <div class="frame">
    <div class="card">
      <div class="header">
        <div class="crest">👑</div>
        <h1 class="title">The Royal Dhaba</h1>
        <p class="subtitle">Authentic taste, royal welcome</p>
      </div>

      <div id="message-container"></div>

      <!-- Auth panels -->
      <div id="auth-view">

        <!--
          GOOGLE SIGN-IN BUTTON
          Client ID / Client Secret YAHAN nahi likhna hai —
          woh Render dashboard ke "Environment" tab me
          GOOGLE_CLIENT_ID aur GOOGLE_CLIENT_SECRET ke naam se
          jaate hain, aur app.py unhe wahan se automatically
          padh leta hai (os.environ.get(...)).
          Yeh button seedha Flask ke /login/google route ko
          hit karta hai, jo aage Google ke consent screen
          par le jaata hai.
        -->
        <a href="/login/google" style="text-decoration:none;">
          <button type="button" class="submit google">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l6-6C34.6 5.1 29.6 3 24 3c-7.7 0-14.3 4.4-17.7 10.7z"/>
              <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.4C29.6 36.4 26.9 37 24 37c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.6 40.5 16.2 45 24 45z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.4C41.5 35.8 45 30.4 45 24c0-1.2-.1-2.4-.4-3.5z"/>
            </svg>
            Continue with Google
          </button>
        </a>

        <div class="divider">or sign in manually</div>

        <div class="tabs">
          <button type="button" class="tab active" id="tab-login">Sign in</button>
          <button type="button" class="tab" id="tab-register">Register</button>
          <div class="tab-indicator" id="tab-indicator"></div>
        </div>

        <div id="login-panel" class="panel active">
          <form id="loginForm" novalidate>
            <div class="field">
              <label for="login-username">Username</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </span>
                <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
              </div>
              <div class="error-msg" data-error-for="login-username"></div>
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                </span>
                <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
                <button type="button" class="toggle-eye" data-target="login-password" aria-label="Show password">show</button>
              </div>
              <div class="error-msg" data-error-for="login-password"></div>
            </div>
            <div class="remember-row">
              <label class="remember-check">
                <input type="checkbox" id="remember-me"> Remember me
              </label>
              <button type="button" class="forgot-link" id="forgot-password">Forgot password?</button>
            </div>
            <button type="submit" class="submit" id="login-submit-btn">Sign in</button>
            <p class="hint" style="text-align:center; margin-top:12px;">Try the demo — username <strong>demo</strong>, password <strong>demo123</strong></p>
          </form>
        </div>

        <div id="register-panel" class="panel">
          <form id="registerForm" novalidate>
            <div class="field">
              <label for="reg-username">Choose a username</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </span>
                <input type="text" id="reg-username" placeholder="e.g. spicelover22" autocomplete="username">
              </div>
              <div class="error-msg" data-error-for="reg-username"></div>
            </div>
            <div class="field">
              <label for="reg-email">Email address</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                </span>
                <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
              </div>
              <div class="error-msg" data-error-for="reg-email"></div>
            </div>
            <div class="field">
              <label for="reg-password">Create password</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                </span>
                <input type="password" id="reg-password" placeholder="At least 6 characters" autocomplete="new-password">
                <button type="button" class="toggle-eye" data-target="reg-password" aria-label="Show password">show</button>
              </div>
              <div class="strength" id="strength-bar">
                <span></span><span></span><span></span>
              </div>
              <div class="error-msg" data-error-for="reg-password"></div>
            </div>
            <div class="field">
              <label for="reg-confirm-password">Confirm password</label>
              <div class="input-wrap">
                <span class="icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                </span>
                <input type="password" id="reg-confirm-password" placeholder="Re-enter your password" autocomplete="new-password">
                <button type="button" class="toggle-eye" data-target="reg-confirm-password" aria-label="Show password">show</button>
              </div>
              <div class="error-msg" data-error-for="reg-confirm-password"></div>
            </div>
            <button type="submit" class="submit brass" id="register-submit-btn">Create account</button>
          </form>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="dashboard" class="hidden" style="display:none;">
        <div class="dashboard-hero">
          <div class="avatar" id="user-avatar"></div>
          <h3 id="welcome-user"></h3>
          <p>You're signed in to your Royal Dhaba account.</p>
          <div class="member-since" id="member-since"></div>
        </div>
        <a class="dash-link" href="{{ url_for('home') }}">
          <button type="button" class="submit">Go to Royal Dhaba</button>
        </a>
        <button type="button" class="submit brass" id="logout">Sign out</button>
      </div>

    </div>
  </div>

  <div class="stat-strip" id="total-users">Total registered users: 0</div>
</div>

<script>
  // ---------- decorative string lights ----------
  (function drawBulbs(){
    const g = document.getElementById('bulbs');
    const n = 14;
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      const x = t * 440;
      const y = 10 + Math.sin(t * Math.PI) * 60;
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', x);
      c.setAttribute('cy', y + 4);
      c.setAttribute('r', 3.2);
      c.setAttribute('fill', i % 2 === 0 ? '#e8b93a' : '#1f6f6f');
      c.setAttribute('class', 'bulb');
      g.appendChild(c);
    }
  })();

  // ---------- in-memory user store (demo only) ----------
  let users = [{
    id: 1,
    username: 'demo',
    email: 'demo@royaldhaba.com',
    password: 'demo123',
    registeredAt: new Date().toLocaleString(),
    lastLogin: null
  }];
  let currentUser = null;

  const authView = document.getElementById('auth-view');
  const dashboard = document.getElementById('dashboard');
  const messageContainer = document.getElementById('message-container');
  const totalUsersSpan = document.getElementById('total-users');
  const welcomeUser = document.getElementById('welcome-user');

  // ---------- tabs ----------
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  const loginPanel = document.getElementById('login-panel');
  const registerPanel = document.getElementById('register-panel');

  const tabIndicator = document.getElementById('tab-indicator');

  function activateTab(which) {
    const isLogin = which === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabRegister.classList.toggle('active', !isLogin);
    loginPanel.classList.toggle('active', isLogin);
    registerPanel.classList.toggle('active', !isLogin);
    tabIndicator.style.transform = isLogin ? 'translateX(0%)' : 'translateX(100%)';
    clearMessages();
  }
  tabLogin.addEventListener('click', () => activateTab('login'));
  tabRegister.addEventListener('click', () => activateTab('register'));

  // ---------- forgot password (demo) ----------
  document.getElementById('forgot-password').addEventListener('click', () => {
    showMessage('Please ask a staff member to reset your password at the counter.', 'success');
  });

  // ---------- show/hide password ----------
  document.querySelectorAll('.toggle-eye').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.textContent = isPassword ? 'hide' : 'show';
    });
  });

  // ---------- password strength ----------
  const regPassword = document.getElementById('reg-password');
  const strengthBars = document.querySelectorAll('#strength-bar span');
  regPassword.addEventListener('input', () => {
    const val = regPassword.value;
    let score = 0;
    if (val.length >= 6) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    if (val.length >= 10 && /[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#b3402c', '#d4a017', '#4c7a4f'];
    strengthBars.forEach((bar, i) => {
      bar.style.background = i < score ? colors[Math.max(score - 1, 0)] : 'var(--line)';
    });
  });

  // ---------- helpers ----------
  function setError(fieldId, msg) {
    const input = document.getElementById(fieldId);
    const err = document.querySelector(`[data-error-for="${fieldId}"]`);
    if (input) input.classList.toggle('invalid', !!msg);
    if (err) err.textContent = msg || '';
  }

  function showMessage(text, type) {
    messageContainer.innerHTML = `<div class="message ${type}">${type === 'success' ? '✓' : '⚠'} ${text}</div>`;
    setTimeout(clearMessages, 4000);
  }
  function clearMessages() { messageContainer.innerHTML = ''; }

  function updateUserCount() {
    totalUsersSpan.textContent = `Total registered users: ${users.length}`;
  }
  updateUserCount();

  // ---------- button loading state ----------
  function setLoading(btn, loading, labelWhileLoading, originalLabel) {
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${labelWhileLoading}` : originalLabel;
  }

  // ---------- registration ----------
  const registerBtn = document.getElementById('register-submit-btn');
  document.getElementById('registerForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirmPassword = document.getElementById('reg-confirm-password').value;

    ['reg-username', 'reg-email', 'reg-password', 'reg-confirm-password'].forEach(id => setError(id, ''));
    let valid = true;

    if (!username) { setError('reg-username', 'Choose a username'); valid = false; }
    else if (users.find(u => u.username === username)) { setError('reg-username', 'Username already taken'); valid = false; }

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('reg-email', 'Enter a valid email'); valid = false; }
    else if (users.find(u => u.email === email)) { setError('reg-email', 'Email already registered'); valid = false; }

    if (password.length < 6) { setError('reg-password', 'At least 6 characters'); valid = false; }

    if (confirmPassword !== password) { setError('reg-confirm-password', 'Passwords do not match'); valid = false; }

    if (!valid) return;

    setLoading(registerBtn, true, 'Creating account…', 'Create account');
    setTimeout(() => {
      users.push({
        id: users.length + 1,
        username, email, password,
        registeredAt: new Date().toLocaleString(),
        lastLogin: null
      });
      updateUserCount();
      showMessage('Account created — you can sign in now.', 'success');
      document.getElementById('registerForm').reset();
      strengthBars.forEach(bar => bar.style.background = 'var(--line)');
      setLoading(registerBtn, false, '', 'Create account');
      setTimeout(() => activateTab('login'), 900);
    }, 550);
  });

  // ---------- login ----------
  const loginBtn = document.getElementById('login-submit-btn');
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    setError('login-username', '');
    setError('login-password', '');

    if (!username || !password) {
      showMessage('Enter both username and password', 'error');
      if (!username) setError('login-username', 'Required');
      if (!password) setError('login-password', 'Required');
      return;
    }

    setLoading(loginBtn, true, 'Signing in…', 'Sign in');

    setTimeout(() => {
      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        user.lastLogin = new Date().toLocaleString();
        currentUser = user;
        authView.style.display = 'none';
        dashboard.style.display = 'block';
        welcomeUser.textContent = `Hello, ${user.username}!`;
        document.getElementById('user-avatar').textContent = user.username.slice(0, 2).toUpperCase();
        document.getElementById('member-since').textContent = `Member since ${user.registeredAt.split(',')[0]}`;
        showMessage('Signed in successfully.', 'success');
      } else {
        showMessage('Invalid username or password.', 'error');
        setError('login-username', ' ');
        setError('login-password', 'Check your credentials');
      }
      setLoading(loginBtn, false, '', 'Sign in');
    }, 500);
  });

  // ---------- logout ----------
  document.getElementById('logout').addEventListener('click', () => {
    currentUser = null;
    dashboard.style.display = 'none';
    authView.style.display = 'block';
    document.getElementById('loginForm').reset();
    activateTab('login');
    showMessage('You have been signed out.', 'success');
  });
</script>

</body>
</html>
