<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Dhaba - Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);  
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .crown-icon {
            font-size: 48px;
            color: #ff6b35;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 1px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
            font-style: italic;
        }

        .form-container {
            position: relative;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            box-shadow: 0 4px 15px rgba(116, 185, 255, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(116, 185, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #00a085);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            margin-top: 10px;
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
        }

        .toggle-link a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .toggle-link a:hover {
            color: #f7931e;
            text-decoration: underline;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-count {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            color: white;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .form-group input.invalid {
            border-color: #e74c3c;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 30px 25px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .crown-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    
    <div class="container">
        <div class="header">
            <div class="crown-icon">👑</div>
            <h1 class="title">THE ROYAL DHABA</h1>
            <p class="subtitle">Authentic Taste, Royal Experience</p>
        </div>

        <div id="message-container"></div>

        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2 style="text-align: center; margin-bottom: 25px; color: #2c3e50;">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
                </a>
            </form>
            <div class="toggle-link">
                <a href="#" id="show-register">Don't have an account? Register here</a>
            </div>
        </div>

        <!-- Registration Form -->
        <div id="register-form" class="form-container hidden">
            <h2 style="text-align: center; margin-bottom: 25px; color: #2c3e50;">Join the Royal Family</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-username">Create Username</label>
                    <input type="text" id="reg-username" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Create Password</label>
                    <input type="password" id="reg-password" name="password" required placeholder="Create a strong password">
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" id="reg-confirm-password" name="confirmPassword" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-secondary">Create Account</button>
            </form>
            <div class="toggle-link">
                <a href="#" id="show-login">Already have an account? Sign in here</a>
            </div>
        </div>

        <!-- Success Dashboard -->
        <div id="dashboard" class="form-container hidden">
            <h2 style="text-align: center; margin-bottom: 25px; color: #2c3e50;">Welcome to Royal King Dhaba!</h2>
            <div style="text-align: center; padding: 30px; background: linear-gradient(135deg, #74b9ff, #0984e3); border-radius: 15px; color: white; margin-bottom: 20px;">
                <h3 id="welcome-user" style="margin-bottom: 10px;"></h3>
                <p>You have successfully logged in to your royal account!</p>
            </div>
            <div>
                <a href="homepage.html">
                    <button id="Go to Royal Dhaba" class="btn btn-primary">Go to Royal Dhaba</button>
                </a>
            </div>
            <button id="logout" class="btn btn-primary">Sign Out</button>
        </div>

        <div class="user-count">
            <span id="total-users">Total Registered Users: 0</span>
        </div>
    </div>

    <script>
        // In-memory user storage
        let users = [];
        let currentUser = null;

        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const dashboard = document.getElementById('dashboard');
        const messageContainer = document.getElementById('message-container');
        const totalUsersSpan = document.getElementById('total-users');
        const welcomeUser = document.getElementById('welcome-user');

        // Toggle between forms
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            clearMessages();
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            clearMessages();
        });

        // Registration
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            // Validation
            if (!username || !email || !password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                document.getElementById('reg-confirm-password').classList.add('invalid');
                setTimeout(() => {
                    document.getElementById('reg-confirm-password').classList.remove('invalid');
                }, 500);
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }

            // Check if username already exists
            if (users.find(user => user.username === username)) {
                showMessage('Username already exists. Please choose another.', 'error');
                document.getElementById('reg-username').classList.add('invalid');
                setTimeout(() => {
                    document.getElementById('reg-username').classList.remove('invalid');
                }, 500);
                return;
            }

            // Check if email already exists
            if (users.find(user => user.email === email)) {
                showMessage('Email already registered. Please use another email.', 'error');
                return;
            }

            // Create new user
            const newUser = {
                id: users.length + 1,
                username: username,
                email: email,
                password: password,
                registeredAt: new Date().toLocaleString(),
                lastLogin: null
            };

            users.push(newUser);
            updateUserCount();
            
            showMessage('Account created successfully! You can now log in.', 'success');
            
            // Reset form and switch to login
            document.getElementById('registerForm').reset();
            setTimeout(() => {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                clearMessages();
            }, 2000);
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showMessage('Please enter both username and password', 'error');
                return;
            }

            // Find user
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                // Update last login
                user.lastLogin = new Date().toLocaleString();
                currentUser = user;
                
                // Show dashboard
                loginForm.classList.add('hidden');
                dashboard.classList.remove('hidden');
                welcomeUser.textContent = `Hello, ${user.username}!`;
                showMessage('Login successful! Welcome to Royal Dhaba.', 'success');
            } else {
                showMessage('Invalid username or password. Please try again.', 'error');
                document.getElementById('login-username').classList.add('invalid');
                document.getElementById('login-password').classList.add('invalid');
                setTimeout(() => {
                    document.getElementById('login-username').classList.remove('invalid');
                    document.getElementById('login-password').classList.remove('invalid');
                }, 500);
            }
        });

        // Logout
        document.getElementById('logout').addEventListener('click', () => {
            currentUser = null;
            dashboard.classList.add('hidden');
            loginForm.classList.remove('hidden');
            document.getElementById('loginForm').reset();
            clearMessages();
            showMessage('You have been logged out successfully.', 'success');
        });

        // Helper functions
        function showMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            
            messageContainer.innerHTML = '';
            messageContainer.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function clearMessages() {
            messageContainer.innerHTML = '';
        }

        function updateUserCount() {
            totalUsersSpan.textContent = `Total Registered Users: ${users.length}`;
        }

        // Initialize
        updateUserCount();
        
        // Demo data for testing (remove in production)
        users.push({
            id: 1,
            username: 'demo',
            email: 'demo@royaldhaba.com',
            password: 'demo123',
            registeredAt: new Date().toLocaleString(),
            lastLogin: null
        });
        updateUserCount();
    </script>
</body>
</html>
